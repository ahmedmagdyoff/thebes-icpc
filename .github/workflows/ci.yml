name: Check

run-name: "${{ github.event.head_commit.message }}"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Required Files
        run: |
          test -f index.html
          test -f css/style.css
          test -f js/script.js
          test -f js/pre.js

      - name: Success
        run: echo "Project validation passed."
