name: Deploy

run-name: "${{ github.event.workflow_run.head_commit.message }}"

permissions:
  contents: read

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    environment:
      name: Production
      url: https://thebes-icpc.site

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/thebes-icpc/htdocs/thebes-icpc.site

            git fetch origin
            git reset --hard origin/main

            sleep 5

            curl -f https://thebes-icpc.site
